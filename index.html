<!DOCTYPE html>
<html lang="es">
<head>
	<script src="https://unpkg.com/html5-qrcode"></script>
	<meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Punto de Venta</title>
	<link rel="manifest" href="manifest.json">
	<meta name="theme-color" content="#064e2f">

  <style>
    body {
  font-family: Arial;
  background:#fff8e7;
  margin:0;
  padding:14px;
}

.logo-pos {
  text-align:center;
  background:#064e2f;
  padding:14px;
  border-radius:18px;
  margin-bottom:14px;
  color:white;
}

.logo-pos img {
  max-width:180px;
  width:70%;
}

.usuario-pos {
  font-size:14px;
  margin-top:6px;
  color:#fff3d1;
}

button {
  padding:12px;
  font-size:16px;
  border:none;
  border-radius:12px;
  background:#0b8043;
  color:white;
  margin-top:8px;
  cursor:pointer;
}

.btn-cargar {
  width:100%;
  margin-bottom:12px;
  background:#0b8043;
}

.btn-eliminar {
  background:#d93025;
}

.btn-cobrar {
  background:#064e2f;
  width:100%;
  font-size:22px;
  font-weight:bold;
}

.item-carrito {
  background:white;
  padding:8px 10px;
  margin-bottom:6px;
  border-radius:10px;
  box-shadow:0 1px 3px rgba(0,0,0,.12);
}

.item-linea {
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:8px;
}

.item-nombre {
  font-size:15px;
  font-weight:bold;
}

.item-info {
  font-size:14px;
  color:#555;
}

.item-importe {
  font-size:16px;
  color:#0b8043;
  font-weight:bold;
  white-space:nowrap;
}

.item-botones button {
  padding:6px 10px;
  font-size:14px;
  margin-top:4px;
}

#total {
  background:#f97316;
  color:white;
  padding:16px;
  border-radius:14px;
  font-size:26px;
  text-align:center;
  font-weight:bold;
  margin-top:12px;
}
  </style>
</head>

<body>

<div id="pantallaLogin">
  <h1>Login</h1>

  <input
    id="pin"
    type="password"
    placeholder="Ingresa PIN"
    style="width:100%; padding:14px; font-size:18px; border-radius:10px; border:1px solid #ccc;"
  >

  <button class="btn-cargar" onclick="login()">Entrar</button>
  <div id="msgLogin" style="text-align:center; font-weight:bold;"></div>
</div>

<div id="pantallaVenta" style="display:none;">
  
<div class="logo-pos" id="logoPOS">
  <img src="logo-emi.png" alt="Abarrotes EMI">
  <div class="usuario-pos" id="usuarioPantalla">Usuario</div>
<div
    id="modoActual"
    style="
        margin-top:10px;
        padding:10px;
        border-radius:12px;
        background:#16a34a;
        color:white;
        font-size:18px;
        font-weight:bold;
        text-align:center;
    "
>
    🟢 VENTA
</div>
	
</div>

  <button class="btn-cargar" onclick="cargarProductos()">Cargar productos</button>

  <div id="estado">Esperando...</div>

<input
  type="text"
  id="buscador"
  placeholder="Buscar producto o código..."
  onkeyup="filtrarProductos()"
  style="
    width:100%;
    padding:14px;
    font-size:18px;
    border-radius:10px;
    border:1px solid #ccc;
    margin-bottom:12px;
  "
>
	<div
  id="sugerencias"
  style="
    display:none;
    background:white;
    border:1px solid #ddd;
    border-radius:10px;
    overflow:hidden;
    margin-top:-8px;
    margin-bottom:12px;
    box-shadow:0 2px 8px rgba(0,0,0,.15);
  "
></div>
	<button class="btn-cargar" onclick="iniciarEscaner()">
  📷 Escanear código
	</button>
	<button
  class="btn-eliminar"
  onclick="detenerEscaner()"
  style="width:100%;"
>
  Cerrar escáner
</button>

<div
  id="reader"
  style="
    display:none;
    max-width:180px;
    margin:auto;
  "
></div>
	<div
  id="mensajePOS"
  style="
    display:none;
    padding:10px;
    margin:10px 0;
    border-radius:10px;
    text-align:center;
    font-weight:bold;
  "
></div>

 <h2 id="tituloCarrito">Carrito</h2>
  <div id="carrito"></div>

  <div id="total">TOTAL: $0.00</div>

<div id="bloqueCompra" style="display:none;">

  <h2>Proveedor</h2>

  <input
    id="proveedorCompra"
    type="text"
    placeholder="Nombre del proveedor..."
    style="
      width:100%;
      padding:14px;
      font-size:18px;
      border-radius:10px;
      border:1px solid #ccc;
      margin-bottom:12px;
    "
  >
<h2>Factura proveedor</h2>

<input
  id="facturaCompra"
  type="text"
  placeholder="Ej. A-15487"
  style="
    width:100%;
    padding:14px;
    font-size:18px;
    border-radius:10px;
    border:1px solid #ccc;
    margin-bottom:12px;
  "
>
<h2>Observaciones</h2>

<textarea
  id="observacionCompra"
  placeholder="Ej. mercancía incompleta, entrega parcial, descuento aplicado..."
  style="
    width:100%;
    padding:14px;
    font-size:18px;
    border-radius:10px;
    border:1px solid #ccc;
    margin-bottom:12px;
    min-height:90px;
  "
></textarea>

<h2>Fecha de compra</h2>

<input
  id="fechaCompra"
  type="date"
  style="
    width:100%;
    padding:14px;
    font-size:18px;
    border-radius:10px;
    border:1px solid #ccc;
    margin-bottom:12px;
  "
>

</div>
<div id="bloquePago">
<h2>Método de pago</h2>

<select id="metodoPago"
	onchange="cambiarMetodoPago()"
style="width:100%; padding:14px; font-size:18px; border-radius:10px; margin-bottom:12px;">
  <option value="EFECTIVO">Efectivo</option>
  <option value="TARJETA">Tarjeta</option>
  <option value="TRANSFERENCIA">Transferencia</option>
</select>
<div id="bloqueEfectivo">

  <h2>Importe recibido</h2>

  <input
    type="number"
    id="importeRecibido"
    placeholder="0.00"
    oninput="calcularCambio()"
    style="width:100%; padding:14px; font-size:18px; border-radius:10px; border:1px solid #ccc;"
  >

  <div id="cambio" style="margin-top:10px; font-size:24px; font-weight:bold; color:#0b8043;">
    Cambio: ---
  </div>
</div>
</div>
	
 <button id="btnCobrar" class="btn-cobrar" onclick="cobrar()">Cobrar</button>
<button
  id="btnAdmin"
  class="btn-cargar"
  onclick="mostrarAdmin()"
  style="display:none; background:#374151;"
>
  ⚙️ Administración
</button>
</div>
<div id="pantallaAdmin" style="display:none;">

  <h1>Administración</h1>

<div id="bloqueModo" style="display:none; margin-bottom:14px;">
  <label style="font-size:15px; font-weight:bold;">
    Modo de operación
  </label>

  <select
    id="modoOperacion"
    onchange="cambiarModoOperacion()"
    style="width:100%; padding:14px; border-radius:10px; font-size:18px; margin-top:6px;"
  >
    <option value="VENTA">🟢 Venta</option>
    <option value="COMPRA">📦 Compra</option>
    <option value="CONSIGNACION">🤝 Consignación</option>
  </select>
</div>

<button class="btn-cargar" onclick="mostrarProductosAdmin()">
  📦 Productos
</button>

  <button class="btn-cargar">
    📋 Inventario
  </button>

  <button class="btn-cargar">
    📊 Reportes
  </button>

  <button class="btn-cargar">
    👤 Usuarios
  </button>
<button
  class="btn-cargar"
  style="background:#b91c1c;"
  onclick="cerrarSesion()"
>
  🚪 Cerrar sesión
</button>
  <button
    class="btn-eliminar"
    style="width:100%;"
    onclick="regresarVenta()"
  >
    ⬅️ Regresar
  </button>

</div>
<div id="pantallaProductos" style="display:none;">

  <h1>Productos</h1>

  <button class="btn-cargar">
    ➕ Nuevo producto
  </button>

  <button class="btn-cargar">
    🔍 Buscar producto
  </button>

  <button class="btn-eliminar" style="width:100%;" onclick="regresarAdminDesdeProductos()">
    ⬅️ Regresar
  </button>

</div>	
<script>

// ==================================================
// CONFIGURACIÓN
// ==================================================

	
const API_URL = "https://script.google.com/macros/s/AKfycbz2mzbagjmu6tQH-28eyPfFRdm5z1A33CepLmeXCRbB93VaJftw_jaDyMosSVz5Mbx6ZA/exec";


// ==================================================
// ESTADO GLOBAL POS
// ==================================================

	
const POS = {

  // Sistema
  version: "1.0.0",

  // Operación
  modo: "VENTA",

  // Usuario
  usuario: "",
  rol: "",

  // Catálogos
  productos: [],

  // Venta actual
  carrito: [],

  // Escáner
  escaner: null,
  escaneando: false,
  ultimoCodigoEscaneado: "",
  tiempoUltimoEscaneo: 0,

  // Configuración
  configuracion: {

    sonido: true,
    sesionActiva: false

  }

};


// ==================================================
// LOGIN Y SESIÓN
// ==================================================
	
	async function login() {
  const pin = document.getElementById("pin").value.trim();
  const msg = document.getElementById("msgLogin");

  if (pin === "") {
    msg.innerText = "Ingresa un PIN";
    return;
  }

  msg.innerText = "Validando...";

  try {
    const respuesta = await fetch(API_URL + "?action=login&pin=" + encodeURIComponent(pin));
    const data = await respuesta.json();

    if (data.ok) {
      POS.usuario = data.usuario;
      POS.rol = data.rol || "VENDEDOR";
	guardarSesion();
	

      document.getElementById("pantallaLogin").style.display = "none";
      document.getElementById("pantallaVenta").style.display = "block";

      document.getElementById("estado").innerText = "Usuario: " + POS.usuario;

      document.getElementById("usuarioPantalla").innerText =
        POS.usuario + " · " + POS.rol;

      cargarProductos();
      cambiarMetodoPago();

      if (POS.rol === "ADMIN") {
        document.getElementById("btnAdmin").style.display = "block";
		document.getElementById("bloqueModo").style.display = "block";
      }

    } else {
      msg.innerText = "PIN incorrecto";
    }

  } catch (error) {
    msg.innerText = "Error de conexión: " + error.message;
  }
}
function guardarSesion() {

  const hoy = new Date().toISOString().slice(0, 10);

  localStorage.setItem("POS_SESION", JSON.stringify({

    usuario: POS.usuario,
    rol: POS.rol,
    fecha: hoy

  }));

  POS.configuracion.sesionActiva = true;

}
function cargarSesion() {

  const sesionGuardada = localStorage.getItem("POS_SESION");

  if (!sesionGuardada) return;

  const sesion = JSON.parse(sesionGuardada);
  const hoy = new Date().toISOString().slice(0, 10);

  if (sesion.fecha !== hoy) {
    localStorage.removeItem("POS_SESION");
    return;
  }

  POS.usuario = sesion.usuario;
  POS.rol = sesion.rol;
  POS.configuracion.sesionActiva = true;

  document.getElementById("pantallaLogin").style.display = "none";
  document.getElementById("pantallaVenta").style.display = "block";

  document.getElementById("estado").innerText = "Usuario: " + POS.usuario;

  document.getElementById("usuarioPantalla").innerText =
    POS.usuario + " · " + POS.rol;

  if (POS.rol === "ADMIN") {
    document.getElementById("btnAdmin").style.display = "block";
	document.getElementById("bloqueModo").style.display = "block";
  }

  cargarProductos();
  cambiarMetodoPago();

}

function cerrarSesion() {
if (!confirm("¿Deseas cerrar la sesión?")) return;

  localStorage.removeItem("POS_SESION");

  POS.configuracion.sesionActiva = false;

  POS.usuario = "";
  POS.rol = "";

  document.getElementById("pin").value = "";
  document.getElementById("msgLogin").innerText = "";

  document.getElementById("pantallaAdmin").style.display = "none";
  document.getElementById("pantallaVenta").style.display = "none";
  document.getElementById("pantallaLogin").style.display = "block";

  document.getElementById("btnAdmin").style.display = "none";
	document.getElementById("bloqueModo").style.display = "none";

  limpiarOperacion();

}
// ==================================================
// PRODUCTOS
// ==================================================

	
async function cargarProductos() {
  const estado = document.getElementById("estado");

  estado.innerText = "Cargando productos...";

  try {
    const respuesta = await fetch(API_URL + "?action=productos");
    const data = await respuesta.json();

    if (!data.ok) {
      estado.innerText = "Error al cargar productos";
      return;
    }

    POS.productos = data.productos;
    estado.innerText = "Productos cargados: " + POS.productos.length;

	mostrarProductos(POS.productos);

  } catch (error) {
    estado.innerText = "Error de conexión: " + error.message;
  }
}

function filtrarProductos() {

  const texto = document
    .getElementById("buscador")
    .value
    .toLowerCase()
    .trim();

  const sugerencias =
    document.getElementById("sugerencias");

  sugerencias.innerHTML = "";

  if (texto === "") {

    sugerencias.style.display = "none";
    return;

  }

  const filtrados = POS.productos.filter(p =>

    p.producto.toLowerCase().includes(texto) ||

    p.codigo.toLowerCase().includes(texto)

  );

  if (filtrados.length === 0) {

    sugerencias.style.display = "none";
    return;

  }

  // Si el código es exacto, agregar automáticamente

  const exacto = POS.productos.find(p =>
    p.codigo.toLowerCase() === texto
  );

  if (exacto) {

    agregarAlCarrito(exacto.codigo);

    document.getElementById("buscador").value = "";

    sugerencias.style.display = "none";

    return;

  }

  // Mostrar máximo 8 sugerencias

  filtrados.slice(0,8).forEach(producto => {

    const div = document.createElement("div");

    div.style.padding = "10px";
    div.style.borderBottom = "1px solid #eee";
    div.style.cursor = "pointer";

    div.innerHTML = `
      <strong>${producto.producto}</strong><br>
      <small>${producto.codigo}</small>
      <span style="float:right; color:#0b8043; font-weight:bold;">
        $${producto.precio.toFixed(2)}
      </span>
    `;

    div.onclick = () => {

    agregarAlCarrito(producto.codigo, "BUSCADOR");

      document.getElementById("buscador").value = "";

      sugerencias.style.display = "none";

    };

    sugerencias.appendChild(div);

  });

  sugerencias.style.display = "block";

}

function mostrarProductos(listaMostrar) {

  if (listaMostrar.length === 1) {

    agregarAlCarrito(listaMostrar[0].codigo);

    document.getElementById("buscador").value = "";

  }
}



// ==================================================
// CARRITO
// ==================================================
	
function agregarAlCarrito(codigo, origen = "BUSCADOR") {

  const producto = POS.productos.find(p => p.codigo === codigo);

  if (!producto) return;

  const index = POS.carrito.findIndex(i => i.codigo === codigo);

  if (index >= 0) {

    const item = POS.carrito[index];

    POS.carrito.splice(index, 1);
    POS.carrito.unshift(item);

    if (origen === "BOTON_MAS") {

      item.cantidad++;

      mostrarMensaje(
        "➕ " + producto.producto + " x" + item.cantidad
      );

    } else {

      mostrarMensaje(
        "⚠️ " + producto.producto + " ya está en carrito. Usa + para agregar otra pieza.",
        "error"
      );

    }

    renderCarrito();
    return;
  }

 POS.carrito.unshift({
    codigo: producto.codigo,
    producto: producto.producto,
    precio: producto.precio,
    costo: producto.costo || 0,
    cantidad: 1
});

  mostrarMensaje(
    "✅ " + producto.producto + " agregado"
  );

  renderCarrito();
}

	function quitarDelCarrito(codigo) {
  const item = POS.carrito.find(i => i.codigo === codigo);
  if (!item) return;

  item.cantidad--;

  if (item.cantidad <= 0) {
    POS.carrito = POS.carrito.filter(i => i.codigo !== codigo);
  }

  renderCarrito();
}

function renderCarrito() {
  const contenedor = document.getElementById("carrito");
  const totalDiv = document.getElementById("total");

  contenedor.innerHTML = "";

  let total = 0;

  POS.carrito.forEach(item => {

   let importe = 0;

if (POS.modo === "VENTA") {
  importe = item.cantidad * item.precio;
}

if (POS.modo === "COMPRA") {
  importe = item.cantidad * (item.costo || 0);
}

if (POS.modo === "CONSIGNACION") {
  importe = item.cantidad * item.precio;
}
    total += importe;

    const div = document.createElement("div");
    div.className = "item-carrito";

    const costo = item.costo || 0;
const precio = item.precio || 0;

const utilidad = precio - costo;

const margen = costo > 0
  ? ((utilidad / costo) * 100)
  : 0;
	  let camposCompra = "";

    if (POS.modo === "COMPRA") {
	let color = "#d1fae5";
let texto = "🟢 Excelente margen";

if (margen < 30) {
  color = "#fef3c7";
  texto = "🟡 Utilidad baja";
}

if (margen < 10) {
  color = "#fee2e2";
  texto = "🔴 Revisar precio";
}

if (utilidad < 0) {
  color = "#fecaca";
  texto = "⛔ Vendes con pérdida";
}
      camposCompra = `
        <div style="margin-top:10px;">

          <label>Cantidad comprada</label>
          <input
            type="number"
            value="${item.cantidad}"
            onchange="actualizarCantidadCompra('${item.codigo}', this.value)"
            style="width:100%; padding:10px; font-size:16px; margin-bottom:8px;"
          >

          <label>Costo unitario</label>
          <input
            type="number"
            value="${item.costo || 0}"
            onchange="actualizarCostoCompra('${item.codigo}', this.value)"
            style="width:100%; padding:10px; font-size:16px; margin-bottom:8px;"
          >

          <label>Precio venta</label>
          <input
            type="number"
            value="${item.precio || 0}"
            onchange="actualizarPrecioCompra('${item.codigo}', this.value)"
            style="width:100%; padding:10px; font-size:16px;"
          >

        </div>
		<div
  id="utilidad-${item.codigo}"
  style="
    margin-top:10px;
    padding:10px;
    background:${color};
    border-radius:8px;
    font-size:15px;
    color:#065f46;
    font-weight:bold;
  "
${texto}

<br><br>

💵 Costo: $${costo.toFixed(2)}

<br>

🏷️ Venta: $${precio.toFixed(2)}

<br>

💰 Utilidad: $${utilidad.toFixed(2)}

<br>

📈 Margen: ${margen.toFixed(2)}%      `;
    }

    div.innerHTML = `
      <div class="item-linea">
        <div>
          <div class="item-nombre">${item.producto}</div>
          <div class="item-info">x${item.cantidad} · $${item.precio.toFixed(2)}</div>
        </div>

        <div class="item-importe">$${importe.toFixed(2)}</div>
      </div>

      ${camposCompra}

      <div class="item-botones">
        <button onclick="agregarAlCarrito('${item.codigo}','BOTON_MAS')">+</button>
        <button class="btn-eliminar" onclick="quitarDelCarrito('${item.codigo}')">-</button>
      </div>
    `;

    contenedor.appendChild(div);
  });

  let textoTotal = "TOTAL";

if (POS.modo === "COMPRA") {
  textoTotal = "TOTAL COMPRA";
}

if (POS.modo === "VENTA") {
  textoTotal = "TOTAL VENTA";
}

if (POS.modo === "CONSIGNACION") {
  textoTotal = "TOTAL CONSIGNACIÓN";
}

totalDiv.innerText = textoTotal + ": $" + total.toFixed(2);
  calcularCambio();
}
function actualizarCantidadCompra(codigo, valor) {
  const item = POS.carrito.find(i => i.codigo === codigo);
  if (!item) return;

  item.cantidad = Number(valor || 0);
  renderCarrito();
}

function actualizarCostoCompra(codigo, valor) {
  const item = POS.carrito.find(i => i.codigo === codigo);
  if (!item) return;

  item.costo = Number(valor || 0);

  renderCarrito();
}

function actualizarPrecioCompra(codigo, valor) {
  const item = POS.carrito.find(i => i.codigo === codigo);
  if (!item) return;

  item.precio = Number(valor || 0);
  renderCarrito();
}
function limpiarOperacion() {

  POS.carrito = [];

  renderCarrito();

  document.getElementById("importeRecibido").value = "";

  document.getElementById("cambio").innerText = "Cambio: ---";

  document.getElementById("metodoPago").value = "EFECTIVO";

  cambiarMetodoPago();

  document.getElementById("buscador").value = "";

}
// ==================================================
// PAGOS Y VENTAS
// ==================================================
function calcularCambio() {

  const textoRecibido =
    document.getElementById("importeRecibido").value.trim();

  const total = POS.carrito.reduce(
    (suma, item) => suma + (item.cantidad * item.precio),
    0
  );

  // Aún no captura el importe recibido
  if (textoRecibido === "") {
    document.getElementById("cambio").innerText = "Cambio: ---";
    return;
  }

  const recibido = Number(textoRecibido);
  const cambio = recibido - total;

  document.getElementById("cambio").innerText =
    "Cambio: $" + cambio.toFixed(2);
}
function cambiarMetodoPago() {

  const metodo =
    document.getElementById("metodoPago").value;

  const bloque =
    document.getElementById("bloqueEfectivo");

  if (metodo === "EFECTIVO") {

    bloque.style.display = "block";

  } else {

    bloque.style.display = "none";

  }
}

async function cobrar() {

  const btnCobrar = document.getElementById("btnCobrar");

  if (btnCobrar.disabled) return;

  if (POS.carrito.length === 0) {
    alert("El carrito está vacío");
    return;
  }

  btnCobrar.disabled = true;
  btnCobrar.innerText = "Guardando...";

  try {

    if (POS.modo === "VENTA") {
      await guardarVenta();
    }

   if (POS.modo === "COMPRA") {
  await guardarCompra();
}

    if (POS.modo === "CONSIGNACION") {
      alert("Modo consignación detectado");
    }

  } catch (error) {

    alert("Error: " + error.message);

  } finally {

    btnCobrar.disabled = false;

    if (POS.modo === "VENTA") {
      btnCobrar.innerText = "Cobrar";
    }

    if (POS.modo === "COMPRA") {
      btnCobrar.innerText = "Guardar compra";
    }

    if (POS.modo === "CONSIGNACION") {
      btnCobrar.innerText = "Guardar consignación";
    }

  }

}
async function guardarVenta() {

  const btnCobrar = document.getElementById("btnCobrar");

  const total = POS.carrito.reduce(
    (suma, item) => suma + (item.cantidad * item.precio),
    0
  );

  const metodoPago = document.getElementById("metodoPago").value;

  const textoRecibido =
    document.getElementById("importeRecibido").value.trim();

  const recibido = Number(textoRecibido || 0);

  if (metodoPago === "EFECTIVO") {

    if (textoRecibido === "") {
      alert("Ingresa el importe recibido");
      return;
    }

    if (recibido < total) {
      alert("El importe recibido es menor al total");
      return;
    }

  }

  const venta = {
    folio: "V-" + new Date().getTime(),
    usuario: POS.usuario,
    total: total,
    metodoPago: metodoPago,
    items: POS.carrito
  };

  const url =
    API_URL +
    "?action=guardarVenta&data=" +
    encodeURIComponent(JSON.stringify(venta));

  const respuesta = await fetch(url);
  const texto = await respuesta.text();

  let data;

  try {
    data = JSON.parse(texto);
  } catch (e) {
    alert("Apps Script no respondió JSON.\nRevisa si la venta se guardó antes de cobrar nuevamente.");
    return;
  }

  if (data.ok) {
    alert("Venta guardada correctamente");
    limpiarOperacion();
  } else {
    alert("Error: " + data.mensaje);
  }

}

// ESCÁNER
// ==================================================	
function beep() {

  const audio = new (window.AudioContext || window.webkitAudioContext)();

  const osc = audio.createOscillator();
  const gain = audio.createGain();

  osc.type = "sine";
  osc.frequency.value = 850;

  gain.gain.value = 0.08;

  osc.connect(gain);
  gain.connect(audio.destination);

  osc.start();

  setTimeout(() => {
    osc.stop();
    audio.close();
  }, 70);

}
function iniciarEscaner() {

  if (POS.escaneando) return;

  document.getElementById("reader").style.display = "block";

  POS.escaner = new Html5Qrcode("reader");
  POS.escaneando = true;

  POS.escaner.start(
    { facingMode: "environment" },
    {
      fps: 10,
      qrbox: 180
    },
    (codigoLeido) => {

      const codigo = codigoLeido.trim();

      const producto = POS.productos.find(p =>
        String(p.codigo).trim() === codigo
      );

      if (!producto) {

        if (esAdmin()) {
          mostrarMensaje(
            "❌ Producto no encontrado: " + codigo + " | Puedes darlo de alta",
            "error"
          );
        } else {
          mostrarMensaje(
            "❌ Producto no encontrado: " + codigo + " | Llame al administrador",
            "error"
          );
        }

        return;
      }

      const ahora = Date.now();

      if (
        codigo === POS.ultimoCodigoEscaneado &&
        ahora - POS.tiempoUltimoEscaneo < 3000
      ) {
        return;
      }

      POS.ultimoCodigoEscaneado = codigo;
      POS.tiempoUltimoEscaneo = ahora;

      agregarAlCarrito(producto.codigo, "ESCANER");

      beep();

    },
    (error) => {
      // Ignorar errores de lectura
    }
  ).catch(err => {

    alert("Error cámara: " + err);

    POS.escaneando = false;
    POS.escaner = null;

    document.getElementById("reader").style.display = "none";

  });
}
function detenerEscaner() {

  if (!POS.escaner) {

    document.getElementById("reader").style.display = "none";

    POS.escaneando = false;

    return;
  }
 POS.escaner.stop().then(() => {

    POS.escaner.clear();

    POS.escaner = null;

    POS.escaneando = false;

    document.getElementById("reader").style.display = "none";

  }).catch(() => {

    POS.escaner = null;

    POS.escaneando = false;

    document.getElementById("reader").style.display = "none";

  });

}
