<!DOCTYPE html>
<html lang="es">
<head>
	<script src="https://unpkg.com/html5-qrcode"></script>
	<meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Punto de Venta</title>

  <style>
    body {
  font-family: Arial;
  background:#fff8e7;
  margin:0;
  padding:14px;
}

.logo-pos {
  text-align:center;
  background:#064e2f;
  padding:14px;
  border-radius:18px;
  margin-bottom:14px;
  color:white;
}

.logo-pos img {
  max-width:180px;
  width:70%;
}

.usuario-pos {
  font-size:14px;
  margin-top:6px;
  color:#fff3d1;
}

button {
  padding:12px;
  font-size:16px;
  border:none;
  border-radius:12px;
  background:#0b8043;
  color:white;
  margin-top:8px;
  cursor:pointer;
}

.btn-cargar {
  width:100%;
  margin-bottom:12px;
  background:#0b8043;
}

.btn-eliminar {
  background:#d93025;
}

.btn-cobrar {
  background:#064e2f;
  width:100%;
  font-size:22px;
  font-weight:bold;
}

.item-carrito {
  background:white;
  padding:8px 10px;
  margin-bottom:6px;
  border-radius:10px;
  box-shadow:0 1px 3px rgba(0,0,0,.12);
}

.item-linea {
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:8px;
}

.item-nombre {
  font-size:15px;
  font-weight:bold;
}

.item-info {
  font-size:14px;
  color:#555;
}

.item-importe {
  font-size:16px;
  color:#0b8043;
  font-weight:bold;
  white-space:nowrap;
}

.item-botones button {
  padding:6px 10px;
  font-size:14px;
  margin-top:4px;
}

#total {
  background:#f97316;
  color:white;
  padding:16px;
  border-radius:14px;
  font-size:26px;
  text-align:center;
  font-weight:bold;
  margin-top:12px;
}
  </style>
</head>

<body>

<div id="pantallaLogin">
  <h1>Login</h1>

  <input
    id="pin"
    type="password"
    placeholder="Ingresa PIN"
    style="width:100%; padding:14px; font-size:18px; border-radius:10px; border:1px solid #ccc;"
  >

  <button class="btn-cargar" onclick="login()">Entrar</button>

  <div id="msgLogin" style="text-align:center; font-weight:bold;"></div>
</div>

<div id="pantallaVenta" style="display:none;">
  
<div class="logo-pos">
  <img src="logo-emi.png" alt="Abarrotes EMI">
  <div class="usuario-pos" id="usuarioPantalla">Usuario</div>
</div>

  <button class="btn-cargar" onclick="cargarProductos()">Cargar productos</button>

  <div id="estado">Esperando...</div>

<input
  type="text"
  id="buscador"
  placeholder="Buscar producto o código..."
  onkeyup="filtrarProductos()"
  style="
    width:100%;
    padding:14px;
    font-size:18px;
    border-radius:10px;
    border:1px solid #ccc;
    margin-bottom:12px;
  "
>
	<button class="btn-cargar" onclick="iniciarEscaner()">
  📷 Escanear código
	</button>

<div
  id="reader"
  style="
    display:none;
    max-width:180px;
    margin:auto;
  "
></div>
	<div
  id="mensajePOS"
  style="
    display:none;
    padding:10px;
    margin:10px 0;
    border-radius:10px;
    text-align:center;
    font-weight:bold;
  "
></div>

  <h2>Carrito</h2>
  <div id="carrito"></div>

  <div id="total">TOTAL: $0.00</div>

<h2>Método de pago</h2>

<select id="metodoPago"
	onchange="cambiarMetodoPago()"
style="width:100%; padding:14px; font-size:18px; border-radius:10px; margin-bottom:12px;">
  <option value="EFECTIVO">Efectivo</option>
  <option value="TARJETA">Tarjeta</option>
  <option value="TRANSFERENCIA">Transferencia</option>
</select>
<div id="bloqueEfectivo">

  <h2>Importe recibido</h2>

  <input
    type="number"
    id="importeRecibido"
    placeholder="0.00"
    oninput="calcularCambio()"
    style="width:100%; padding:14px; font-size:18px; border-radius:10px; border:1px solid #ccc;"
  >

  <div id="cambio" style="margin-top:10px; font-size:24px; font-weight:bold; color:#0b8043;">
    Cambio: $0.00
  </div>
</div>
	
 <button id="btnCobrar" class="btn-cobrar" onclick="cobrar()">Cobrar</button>
<button
  id="btnAdmin"
  class="btn-cargar"
  onclick="mostrarAdmin()"
  style="display:none; background:#374151;"
>
  ⚙️ Administración
</button>
</div>
<div id="pantallaAdmin" style="display:none;">

  <h1>Administración</h1>

  <button class="btn-cargar">
    📦 Productos
  </button>

  <button class="btn-cargar">
    📋 Inventario
  </button>

  <button class="btn-cargar">
    📊 Reportes
  </button>

  <button class="btn-cargar">
    👤 Usuarios
  </button>

  <button
    class="btn-eliminar"
    style="width:100%;"
    onclick="regresarVenta()"
  >
    ⬅️ Regresar
  </button>

</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbz2mzbagjmu6tQH-28eyPfFRdm5z1A33CepLmeXCRbB93VaJftw_jaDyMosSVz5Mbx6ZA/exec";

let productos = [];
let carrito = [];
let usuarioActual = "";
let rolActual = "";
let escaner = null;
let escaneando = false;

async function login() {
  const pin = document.getElementById("pin").value.trim();
  const msg = document.getElementById("msgLogin");

  if (pin === "") {
    msg.innerText = "Ingresa un PIN";
    return;
  }

  msg.innerText = "Validando...";

  try {
    const respuesta = await fetch(API_URL + "?action=login&pin=" + encodeURIComponent(pin));
    const data = await respuesta.json();

    if (data.ok) {
      usuarioActual = data.usuario;
		rolActual = data.rol || "VENDEDOR";

      document.getElementById("pantallaLogin").style.display = "none";
      document.getElementById("pantallaVenta").style.display = "block";

      document.getElementById("estado").innerText = "Usuario: " + usuarioActual;
	document.getElementById("usuarioPantalla").innerText =
  usuarioActual + " · " + rolActual;

      cargarProductos();
	cambiarMetodoPago();
	if (rolActual === "ADMIN") {
  	document.getElementById("btnAdmin").style.display = "block";
}
    } else {
      msg.innerText = "PIN incorrecto";
    }

  } catch (error) {
    msg.innerText = "Error de conexión: " + error.message;
  }
}

async function cargarProductos() {
  const estado = document.getElementById("estado");

  estado.innerText = "Cargando productos...";

  try {
    const respuesta = await fetch(API_URL + "?action=productos");
    const data = await respuesta.json();

    if (!data.ok) {
      estado.innerText = "Error al cargar productos";
      return;
    }

    productos = data.productos;
    estado.innerText = "Productos cargados: " + productos.length;

	mostrarProductos(productos);

  } catch (error) {
    estado.innerText = "Error de conexión: " + error.message;
  }
}

function filtrarProductos() {

  const texto =
    document.getElementById("buscador")
    .value
    .toLowerCase()
    .trim();

  if (texto === "") return;

  const filtrados = productos.filter(p =>
    p.producto.toLowerCase().includes(texto)
    ||
    p.codigo.toLowerCase().includes(texto)
  );

  if (filtrados.length === 1) {

    agregarAlCarrito(filtrados[0].codigo);

    document.getElementById("buscador").value = "";
  }
}

function mostrarProductos(listaMostrar) {

  if (listaMostrar.length === 1) {

    agregarAlCarrito(listaMostrar[0].codigo);

    document.getElementById("buscador").value = "";

  }
}
function agregarAlCarrito(codigo) {
  const producto = productos.find(p => p.codigo === codigo);
  if (!producto) return;

  const item = carrito.find(i => i.codigo === codigo);

  const cantidadActual = item ? item.cantidad : 0;
  const nuevaCantidad = cantidadActual + 1;

  if (nuevaCantidad > producto.existencia) {
    alert(
      "⚠️ Stock insuficiente\n\n" +
      "Producto: " + producto.producto + "\n" +
      "Existencia: " + producto.existencia + "\n" +
      "Cantidad en carrito: " + nuevaCantidad + "\n\n" +
      "La venta se permitirá, pero revisa inventario."
    );
  }

  if (item) {
    item.cantidad++;
  } else {
    carrito.push({
      codigo: producto.codigo,
      producto: producto.producto,
      precio: producto.precio,
      cantidad: 1
    });
  }

  renderCarrito();
}

function quitarDelCarrito(codigo) {
  const item = carrito.find(i => i.codigo === codigo);
  if (!item) return;

  item.cantidad--;

  if (item.cantidad <= 0) {
    carrito = carrito.filter(i => i.codigo !== codigo);
  }

  renderCarrito();
}

function renderCarrito() {
  const contenedor = document.getElementById("carrito");
  const totalDiv = document.getElementById("total");

  contenedor.innerHTML = "";

  let total = 0;

  carrito.forEach(item => {
    const importe = item.cantidad * item.precio;
    total += importe;

    const div = document.createElement("div");
    div.className = "item-carrito";

   div.innerHTML = `
  <div class="item-linea">
    <div>
      <div class="item-nombre">${item.producto}</div>
      <div class="item-info">x${item.cantidad} · $${item.precio.toFixed(2)}</div>
    </div>

    <div class="item-importe">$${importe.toFixed(2)}</div>
  </div>

  <div class="item-botones">
    <button onclick="agregarAlCarrito('${item.codigo}')">+</button>
    <button class="btn-eliminar" onclick="quitarDelCarrito('${item.codigo}')">-</button>
  </div>
`;

    contenedor.appendChild(div);
  });
  totalDiv.innerText = "TOTAL: $" + total.toFixed(2);
calcularCambio();
}
function calcularCambio() {
  const recibido = Number(document.getElementById("importeRecibido").value || 0);
  const total = carrito.reduce((suma, item) => suma + (item.cantidad * item.precio), 0);
  const cambio = recibido - total;

  document.getElementById("cambio").innerText =
    "Cambio: $" + cambio.toFixed(2);
}

function cambiarMetodoPago() {

  const metodo =
    document.getElementById("metodoPago").value;

  const bloque =
    document.getElementById("bloqueEfectivo");

  if (metodo === "EFECTIVO") {

    bloque.style.display = "block";

  } else {

    bloque.style.display = "none";

  }
}

async function cobrar() {

  const btnCobrar = document.getElementById("btnCobrar");

  if (btnCobrar.disabled) return;

  btnCobrar.disabled = true;
  btnCobrar.innerText = "Guardando...";

  if (carrito.length === 0) {
    btnCobrar.disabled = false;
    btnCobrar.innerText = "Cobrar";

    alert("El carrito está vacío");
    return;
  }

  const total = carrito.reduce((suma, item) => suma + (item.cantidad * item.precio), 0);
  const metodoPago = document.getElementById("metodoPago").value;
  const recibido = Number(document.getElementById("importeRecibido").value || 0);

  if (metodoPago === "EFECTIVO" && recibido < total) {

	btnCobrar.disabled = false;
 	 btnCobrar.innerText = "Cobrar"
    alert("El importe recibido es menor al total");
    return;
  }

  const venta = {
    folio: "V-" + new Date().getTime(),
    usuario: usuarioActual,
    total: total,
    metodoPago: metodoPago,
    items: carrito
  };

  try {
    const url = API_URL
      + "?action=guardarVenta&data="
      + encodeURIComponent(JSON.stringify(venta));

    const respuesta = await fetch(url);
    const texto = await respuesta.text();

let data;

try {
  data = JSON.parse(texto);
} catch (e) {
  alert("Apps Script no respondió JSON. Revisa si la venta se guardó antes de cobrar otra vez.");
  return;
}

if (data.ok) {

  alert("Venta guardada correctamente");

  carrito = [];
  renderCarrito();

  document.getElementById("importeRecibido").value = "";
  document.getElementById("cambio").innerText = "Cambio: $0.00";

  document.getElementById("metodoPago").value = "EFECTIVO";
  cambiarMetodoPago();

  document.getElementById("buscador").value = "";

} else {

  alert("Error: " + data.mensaje);

}
  } catch (error) {
    alert("Error al guardar venta: " + error.message);
	} finally {
  	btnCobrar.disabled = false;
  	btnCobrar.innerText = "Cobrar";
}
  
}
function iniciarEscaner() {

  if (escaneando) return;


  document.getElementById("reader").style.display = "block";

  escaner = new Html5Qrcode("reader");
  escaneando = true;

  escaner.start(
    { facingMode: "environment" },
    {
      fps: 10,
      qrbox: 180
    },
    (codigoLeido) => {

  const codigo = codigoLeido.trim();

  const producto = productos.find(p =>
    String(p.codigo).trim() === codigo
  );

  if (!producto) {
    alert("Producto no encontrado: " + codigo);
    return;
  }

  agregarAlCarrito(producto.codigo);

  escaner.stop();

  escaneando = false;

  document.getElementById("reader").style.display = "none";

},
    (error) => {
      // Ignorar errores de lectura
    }

  ).catch(err => {

    alert("Error cámara: " + err);

    escaneando = false;

    document.getElementById("reader").style.display = "none";
  });
}
function mostrarAdmin() {

  document.getElementById("pantallaVenta")
    .style.display = "none";

  document.getElementById("pantallaAdmin")
    .style.display = "block";
}
function regresarVenta() {

  document.getElementById("pantallaAdmin")
    .style.display = "none";

  document.getElementById("pantallaVenta")
    .style.display = "block";
}
</script>

</body>
</html>
